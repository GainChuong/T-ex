      color: var(--navy) !important;
      font-weight: 700 !important;
    }
    .topbar .subtitle {
      color: var(--gray-mid) !important;
      font-weight: 500 !important;
    }
    .topbar .restart-btn,
    .topbar .lang-btn {
      background: var(--white) !important;
      border: 1px solid var(--gray-light) !important;
      color: var(--navy) !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05) !important;
    }
    .topbar .restart-btn:hover,
    .topbar .lang-btn:hover {
      background: var(--gray-xlight) !important;
      border-color: var(--blue) !important;
      color: var(--blue) !important;
    }
    .btn {
      border: 1px solid var(--gray-light) !important;
      background: rgba(255, 255, 255, 0.8) !important;
      color: var(--black) !important;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 1) !important;
      border-color: var(--blue) !important;
      color: var(--blue) !important;
    }
    .btn.primary {
      background: var(--navy) !important;
      color: #ffffff !important;
      border: 1px solid transparent !important;
    }
    .btn.primary:hover {
      background: var(--primary-hover, #395144) !important;
      color: #ffffff !important;
    }
    .likert {
      border: 1px solid var(--gray-light) !important;
      background: rgba(255, 255, 255, 0.6) !important;
    }
    .likert:hover {
      border-color: var(--blue) !important;
    }
    .likert p {
      color: var(--navy) !important;
    }
    .scale label {
      color: var(--gray-mid) !important;
    }
    .scale label:hover {
      color: var(--blue) !important;
    }
    .scale label:has(input:checked) {
      color: var(--blue) !important;
    }
    .scale label:focus-within {
      color: var(--blue) !important;
    }
    .card h2 {
      font-family: var(--font-serif) !important;
      color: var(--blue) !important;
    }
    .card h3 {
      font-family: var(--font-family) !important;
      color: var(--navy) !important;
    }

    /* Style Picker layouts & ReFashion specific styles */
    .shop-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
      margin-top: 12px;
    }
    @media (max-width: 850px) {
      .shop-layout {
        grid-template-columns: 1fr;
      }
    }
    .shop-sidebar {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 20px;
      position: sticky;
      top: 70px;
      color: var(--black);
      box-shadow: 0 4px 15px var(--shadow);
    }
    .sidebar-title {
      font-family: var(--font-serif);
      color: var(--blue) !important;
      font-size: 1.25rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-desc {
      font-size: 0.85rem;
      color: var(--gray-mid);
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .category-status-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .category-status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .status-badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }
    .status-badge.missing {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-badge.complete {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .btn-submit {
      width: 100%;
      padding: 10px;
      border-radius: var(--radius);
      border: none;
      background: var(--navy);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--blue-mid);
      transform: translateY(-1px);
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    /* Product Pickers */
    .picker-category-section {
      margin-bottom: 24px;
    }
    .category-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--gray-light);
      padding-bottom: 6px;
    }
    .category-header-row h3 {
      margin: 0 !important;
      font-size: 1.15rem !important;
      font-family: var(--font-family) !important;
      color: var(--blue) !important;
    }
    .style-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .picker-item-card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 8px;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      text-align: center;
      overflow: hidden;
    }
    .picker-item-card:hover {
      border-color: var(--blue);
      background: rgba(255, 255, 255, 1);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }
    .picker-item-card.selected {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.08);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
    }
    .picker-item-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #10b981;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .picker-item-card.selected .picker-item-badge {
      display: flex;
    }
    .picker-item-img-wrapper {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.03);
      overflow: hidden;
    }
    .picker-item-img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }
    .picker-item-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .picker-item-brand {
      font-size: 0.65rem;
      color: var(--gray-mid);
    }
    /* Recommendation Views */
    .rec-view-container {
      animation: fadeInUp 0.5s ease;
    }
    .rec-view-header {
      margin-bottom: 20px;
      text-align: center;
    }
    .rec-view-header h2 {
      font-family: var(--font-serif);
      color: var(--blue) !important;
      font-size: 1.6rem;
    }
    .rec-view-header p {
      color: var(--gray-mid);
      font-size: 0.9rem;
    }
    .rec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .rec-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 12px;
      position: relative;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }
    .rec-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .match-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(185, 152, 115, 0.15);
      border: 1px solid rgba(185, 152, 115, 0.3);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      z-index: 2;
    }
    .match-badge.unfav-badge {
      background: rgba(239, 68, 68, 0.1) !important;
      border: 1px solid rgba(239, 68, 68, 0.3) !important;
      color: #ef4444 !important;
    }
    .rec-img-wrapper {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.03);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .rec-img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }
    .rec-card:hover .rec-img {
      transform: scale(1.05);
    }
    .rec-details {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .rec-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--black);
      line-height: 1.3;
      margin-bottom: 6px;
      min-height: 34px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-align: left;
    }
    .rec-meta {
      font-size: 0.7rem;
      color: var(--gray-mid);
      margin-bottom: 8px;
      text-align: left;
    }
    .rec-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .rec-price {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--blue);
    }
    .rec-rating {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      padding: 1px 6px;
      border-radius: 6px;
    }
    .rec-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .rec-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 4px;
      color: var(--gray-mid);
    }
    .xai-explanation-content {
      margin-top: auto;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--black);
      background: rgba(91, 116, 83, 0.1);
      padding: 10px 12px;
      border-radius: var(--radius);
      border-left: 3px solid var(--navy);
      line-height: 1.4;
      text-align: left;
    }
    .xai-explanation-content.locked {
      background: rgba(0, 0, 0, 0.03) !important;
      border-left-color: var(--gray-mid) !important;
      color: var(--gray-mid) !important;
      font-style: italic;
    }
    .xai-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--navy);
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .xai-explanation-content.locked .xai-title {
      color: var(--gray-mid) !important;
    }
    .unfav-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: loading-skeleton 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes loading-skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Side-by-side Outfit Comparison */
    .comparison-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-top: 20px;
    }
    .comparison-row {
      display: grid;
      grid-template-columns: 1.2fr 100px 1.5fr;
      gap: 20px;
      align-items: center;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    @media (max-width: 900px) {
      .comparison-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .comparison-middle {
        transform: rotate(90deg);
        margin: 10px 0;
      }
    }
    .comparison-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .comparison-title-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .comparison-title-badge.selected-badge {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .comparison-title-badge.rec-badge {
      background: rgba(46, 125, 125, 0.1);
      color: #2e7d7d;
      border: 1px solid rgba(46, 125, 125, 0.2);
    }
    .comparison-middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 8px;
    }
    .comparison-middle-icon {
      font-size: 2.2rem;
      color: var(--blue);
      animation: pulse-arrow 2s infinite ease-in-out;
    }
    @keyframes pulse-arrow {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); color: #2e7d7d; }
      100% { transform: scale(1); }
    }
    .comparison-middle-match {
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--navy);
      background: rgba(185, 152, 115, 0.15);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(185, 152, 115, 0.3);
      white-space: nowrap;
    }
    .selected-item-mini {
      display: flex;
      gap: 12px;
      align-items: center;
      background: white;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .selected-item-mini-img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.02);
      flex-shrink: 0;
    }
    .selected-item-mini-details {
      flex: 1;
      min-width: 0;
      text-align: left;
    }
    .selected-item-mini-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--black);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .selected-item-mini-meta {
      font-size: 0.68rem;
      color: var(--gray-mid);
      margin-top: 4px;
    }
    .selected-item-mini-price {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--blue);
      margin-top: 4px;
    }

    /* ── Digital Product Passport (DPP) Desktop/Tablet Simulator ── */
    .dpp-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(13, 15, 18, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      animation: fadeInDpp 0.3s forwards ease-out;
      padding: 20px;
    }
    @keyframes fadeInDpp {
      to { opacity: 1; }
    }
    .dpp-passport-container {
      width: 960px;
      max-width: 95vw;
      max-height: 90vh;
      background: #f7f7f7;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: var(--font-sans);
      animation: slideUpDpp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform: translateY(40px);
    }
    @keyframes slideUpDpp {
      to { transform: translateY(0); }
    }
    .dpp-passport-header {
      background: #ffffff;
      padding: 16px 24px;
      border-bottom: 1px solid #E7E2D8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .dpp-passport-title {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }
    .dpp-passport-title h3 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--navy);
      margin: 0;
    }
    .dpp-passport-title p {
      font-size: 0.78rem;
      color: var(--gray-mid);
      margin: 2px 0 0 0;
    }
    .dpp-passport-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--gray-mid);
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }
    .dpp-passport-close:hover {
      color: #ef4444;
    }
    .dpp-passport-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: #f4f5f6;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 850px) {
      .dpp-passport-body {
        grid-template-columns: 1fr;
        padding: 16px;
      }
    }
    .dpp-passport-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .dpp-passport-col > .dpp-passport-card:last-child {
      flex-grow: 1;
    }
    .dpp-passport-card {
      background: #ffffff;
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid #E7E2D8;
      box-shadow: 0 4px 12px rgba(43, 43, 43, 0.03);
    }
    .card-section-title {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #F8F6F1;
      padding-bottom: 8px;
      text-align: left;
    }

    /* Identity elements */
    .dpp-prod-id {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray-mid);
      letter-spacing: 0.05em;
      text-align: left;
    }
    .dpp-blockchain-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(46, 125, 125, 0.06);
      border: 1px solid rgba(46, 125, 125, 0.2);
      color: #2E7D7D;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      margin-top: 6px;
      width: fit-content;
    }
    .dpp-pulse-dot {
      width: 6px;
      height: 6px;
      background-color: #2E7D7D;
      border-radius: 50%;
      animation: dppPulse 1.5s infinite;
    }
    @keyframes dppPulse {
      0% { transform: scale(0.85); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0.5; }
    }
    .dpp-qr-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
    }
    .dpp-qr-box {
      width: 80px;
      height: 80px;
      background: #ffffff;
      border: 1px solid #E7E2D8;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      flex-shrink: 0;
    }
    .dpp-qr-box svg {
      width: 100%;
      height: 100%;
    }

    .dpp-badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .dpp-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }
    .dpp-badge-sdg {
      background: #EAF7F2;
      border: 1px solid rgba(46, 125, 125, 0.25);
      color: #1D6F5A;
    }
    .dpp-badge-esg {
      background: #EEF4FA;
      border: 1px solid rgba(43, 78, 122, 0.25);
      color: #2B4E7A;
    }

    /* Timeline & Traceability elements */
    .dpp-timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 10px;
    }
    .dpp-timeline::before {
      content: '';
      position: absolute;
      left: 17px;
      top: 10px;
      bottom: 24px;
      width: 2px;
      background: #E7E2D8;
    }
    .dpp-timeline-node {
      position: relative;
      padding-left: 32px;
      padding-bottom: 16px;
      text-align: left;
    }
    .dpp-timeline-node:last-child {
      padding-bottom: 0;
    }
    .dpp-node-indicator {
      position: absolute;
      left: 0;
      top: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #A6855B;
      z-index: 2;
      transition: var(--transition);
    }
    .dpp-timeline-node.active .dpp-node-indicator {
      border-color: #2E7D7D;
      background: #2E7D7D;
    }
    .dpp-node-summary {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dpp-node-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #2B2B2B;
    }
    .dpp-node-tier {
      font-size: 0.65rem;
      font-weight: 600;
      color: #2E7D7D;
      text-transform: uppercase;
    }
    .dpp-node-chevron {
      font-size: 0.75rem;
      color: var(--gray-mid);
      transition: transform 0.2s;
    }
    .dpp-timeline-node.expanded .dpp-node-chevron {
      transform: rotate(90deg);
    }
    .dpp-node-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0, 1, 0, 1);
      font-size: 0.72rem;
      color: var(--gray-mid);
      margin-top: 6px;
      line-height: 1.4;
      background: #F8F6F1;
      padding: 0 10px;
      border-radius: 8px;
    }
    .dpp-timeline-node.expanded .dpp-node-details {
      max-height: 150px;
      padding: 8px 10px;
      border: 1px solid #E7E2D8;
    }

    /* Sustainability Metrics */
    .dpp-metric-row {
      margin-bottom: 12px;
      text-align: left;
    }
    .dpp-metric-row:last-child {
      margin-bottom: 0;
    }
    .dpp-metric-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 4px;
    }
    .dpp-metric-val {
      color: #2E7D7D;
      font-weight: 700;
    }
    .dpp-metric-bar {
      height: 8px;
      background: #EEE8DB;
      border-radius: 4px;
      overflow: hidden;
    }
    .dpp-metric-bar-fill {
      height: 100%;
      background: #2E7D7D;
      border-radius: 4px;
      width: 0;
      transition: width 0.8s ease-out;
    }

    /* Materials */
    .dpp-material-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .dpp-material-card {
      background: #F8F6F1;
      border: 1px solid #E7E2D8;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .dpp-material-pct {
      font-size: 1rem;
      font-weight: 800;
      color: #8B5A2B;
    }
    .dpp-material-lbl {
      font-size: 0.68rem;
      color: var(--gray-mid);
      font-weight: 500;
    }

    /* Circular Ownership & Actions */
    .dpp-ownership-badge {
      border: 1px dashed #A6855B;
      background: rgba(166, 133, 91, 0.04);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      margin-bottom: 12px;
    }
    .dpp-own-title {
      font-size: 0.65rem;
      font-weight: 700;
      color: #A6855B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dpp-own-holder {
      font-size: 0.8rem;
      font-weight: 700;
      color: #2B2B2B;
      margin-top: 2px;
    }
    .dpp-action-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dpp-btn {
      width: 100%;
      padding: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: var(--transition);
    }
    .dpp-btn-teal {
      background: #2E7D7D;
      color: #ffffff;
      border: none;
    }
    .dpp-btn-teal:hover {
      background: #1E5D5D;
    }
    .dpp-btn-outline {
      background: transparent;
      border: 1px solid #2E7D7D;
      color: #2E7D7D;
    }
    .dpp-btn-outline:hover {
      background: rgba(46, 125, 125, 0.05);
    }

    /* Community Reviews and QC styles */
    .qc-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      font-size: 0.78rem;
    }
    .qc-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .text-green {
      color: #10b981;
    }
    .blockchain-reviews {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 10px;
    }
    .blockchain-review-card {
      background: #fdfdfd;
      border: 1px solid #E7E2D8;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.72rem;
      text-align: left;
    }
    .review-meta-row {
      display: flex;
      justify-content: space-between;
      color: var(--gray-mid);
      font-size: 0.65rem;
      margin-bottom: 4px;
    }
    .review-hash {
      font-family: monospace;
      font-size: 0.6rem;
      color: var(--gray-mid);
      word-break: break-all;
      background: #f4f5f6;
      padding: 2px 4px;
      border-radius: 4px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <h1 id="topbarTitle">Khảo sát hệ thống kinh tế tuần hoàn ở lĩnh vực thời trang</h1>
    <span class="subtitle" id="topbarSubtitle">Nghiên cứu khoa học · Thử nghiệm người dùng</span>
    <div class="topbar-actions">
      <select id="testCaseSelect" class="restart-btn"
        style="background:var(--blue);border-color:var(--blue-mid);display:none;color:white;cursor:pointer;outline:none">
        <option value="" disabled selected>-- TEST CASE --</option>
        <option value="case_1">Case 1: XAI (No DPP)</option>
        <option value="case_2">Case 2: DPP (No XAI)</option>
        <option value="case_3">Case 3: Both XAI & DPP</option>
        <option value="case_4">Case 4: Neither</option>
      </select>
      <button class="lang-btn" id="langToggle">EN</button>
      <button class="restart-btn" id="restartBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21 2v6h-6"></path>
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
          <path d="M3 22v-6h6"></path>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
        </svg>
        <span id="restartLabel">Làm lại</span>
      </button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressGrid"></div>
    <div class="progress-label" id="progressText"></div>
  </div>

  <div class="wrap">
    <main id="app"></main>
  </div>

  <div class="controls">
    <div class="controls-inner">
      <span class="step-label" id="controlLabel"></span>
      <span id="disclaimerLabel" class="disclaimer-label"></span>
      <div style="display:flex;justify-content:flex-end;gap:10px">
        <button class="btn" id="prevBtn" type="button">‹Quay lại</button>
        <button class="btn primary" id="nextBtn" type="button">Tiếp tục ›</button>
      </div>
    </div>
  </div>


  <!-- TUTORIAL OVERLAY -->
  <div class="tutorial-overlay" id="tutorialOverlay"></div>

  <!-- TOOLTIP -->
  <div class="tooltip-overlay" id="tooltipOverlay"></div>
  <div class="tooltip-popup" id="tooltipPopup">
    <button class="close-btn" id="tooltipClose">&times;</button>
    <div id="tooltipContent"></div>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="login-modal" id="loginModal">
    <div class="login-box">
      <h3>Admin Login</h3>
      <div class="login-error" id="loginError">Tên đăng nhập hoặc mật khẩu không đúng</div>
      <div class="field">
        <label>Email đăng nhập</label>
        <input type="email" id="loginUser" placeholder="Email" autocomplete="off">
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <input type="password" id="loginPass" placeholder="Password">
      </div>
      <button class="btn primary" style="width:100%;margin-top:8px;background:var(--blue);color:white"
        id="loginSubmit">Đăng nhập</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-overlay" id="adminPanel">
    <div class="admin-header">
      <h2>Admin Panel</h2>
      <div style="display:flex;align-items:center;gap:8px">

        <!-- Undo / Redo -->
        <button id="adminUndoBtn" onclick="undo()" title="Hoàn tác (Ctrl+Z)"
          style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.25);padding:6px 12px;border-radius:6px;font-weight:600;font-size: 9pt;cursor:pointer;transition:background 0.2s"
          onmouseover="this.style.background='rgba(255,255,255,0.22)'"
          onmouseout="this.style.background='rgba(255,255,255,0.12)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6" />
            <path d="M3 13C5.4 7.4 11 5 16 7s8 8 6 14" />
          </svg>
          Hoàn tác
        </button>
        <button id="adminRedoBtn" onclick="redo()" title="Làm lại (Ctrl+Y)"
          style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.25);padding:6px 12px;border-radius:6px;font-weight:600;font-size: 9pt;cursor:pointer;transition:background 0.2s"
          onmouseover="this.style.background='rgba(255,255,255,0.22)'"
          onmouseout="this.style.background='rgba(255,255,255,0.12)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7v6h-6" />
            <path d="M21 13c-2.4-5.6-8-8-13-6s-8 8-6 14" />
          </svg>
          Làm lại
        </button>

        <div style="width:1px;height:20px;background:rgba(255,255,255,0.22);margin:0 2px"></div>

        <!-- Test mode toggle -->
        <button id="testModeToggleBtn" onclick="toggleTestMode()" title="Bật/tắt chế độ thử nghiệm"
          style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.25);padding:6px 13px;border-radius:6px;font-weight:600;font-size: 9pt;cursor:pointer;transition:all 0.2s"
          onmouseover="this.style.background='rgba(255,255,255,0.22)'"
          onmouseout="this.style.background=window._isTestMode?'rgba(255,220,80,0.25)':'rgba(255,255,255,0.12)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18" />
          </svg>
          <span id="testModeLabel">Thử nghiệm: Tắt</span>
        </button>

        <div style="width:1px;height:20px;background:rgba(255,255,255,0.22);margin:0 2px"></div>

        <!-- Lang + Logout -->
        <button class="lang-btn" id="adminLangToggle" onclick="toggleAdminLang()"
          style="background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:6px 14px;border-radius:6px;font-weight:700;font-size: 9.5pt;cursor:pointer">EN</button>
        <button class="btn" id="adminLogout" style="background:transparent;color:#fff;border-color:rgba(255,255,255,.5)"
          data-i18n="admin_logout">Đăng xuất</button>

      </div>
    </div>
    <div class="admin-body">
      <div class="admin-tabs">
        <button class="admin-tab active" data-atab="questions" data-i18n="admin_questions">Câu hỏi</button>
        <button class="admin-tab" data-atab="responses" data-i18n="admin_responses">Dữ liệu</button>
        <button class="admin-tab" data-atab="samples" data-i18n="admin_samples">Mẫu</button>
        <button class="admin-tab" data-atab="dashboard" data-i18n="admin_stats">Thống kê</button>
        <button class="admin-tab" data-atab="configure" data-i18n="admin_configure">Tùy chỉnh</button>
      </div>
      <div id="adminContent"></div>
    </div>
  </div>

  <!-- CUSTOM MODAL POPUP (inside adminPanel for correct stacking context) -->
  <div class="custom-modal-backdrop" id="customModal" style="display: none;">
    <div class="custom-modal-box">
      <div class="custom-modal-header" id="customModalTitle">Thông báo</div>
      <div class="custom-modal-body" id="customModalBody">Nội dung thông báo</div>
      <div class="custom-modal-input-container" id="customModalInputContainer" style="display: none;">
        <input type="text" id="customModalInputField" class="custom-modal-input-field">
      </div>
      <div class="custom-modal-footer">
        <button class="btn" id="customModalCancel" style="display: none;">Hủy</button>
        <button class="btn primary" id="customModalOk">Đồng ý</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="i18n.js"></script>
  <script src="app-core.js"></script>
  <script src="app-ui.js"></script>
</body>

</html>
